name: Build Application

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Target operating system'
        required: true
        type: choice
        options:
          - Windows
          - macOS
          - Linux
          - All
        default: 'All'
      app_type:
        description: 'Application type'
        required: true
        type: choice
        options:
          - Server (localhost)
          - Electron (desktop app)
        default: 'Server (localhost)'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Filter: compute which OS entries to include in the build matrix ──
  filter:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - id: compute
        shell: bash
        run: |
          WINDOWS='{"os_name":"Windows","runner":"windows-latest","artifact_suffix":"Windows","pyinstaller_sep":";","exe_name":"Noclip Desktop.exe"}'
          MACOS='{"os_name":"macOS","runner":"macos-latest","artifact_suffix":"macOS","pyinstaller_sep":":","exe_name":"Noclip Desktop"}'
          LINUX='{"os_name":"Linux","runner":"ubuntu-latest","artifact_suffix":"Linux","pyinstaller_sep":":","exe_name":"Noclip Desktop"}'

          OS="${{ github.event.inputs.os }}"
          EVENT="${{ github.event_name }}"

          # Empty OS means tag-push (no workflow_dispatch input); build all.
          if [[ "$EVENT" == "push" || "$OS" == "All" || "$OS" == "" ]]; then
            echo "matrix={\"include\":[$WINDOWS,$MACOS,$LINUX]}" >> "$GITHUB_OUTPUT"
          elif [[ "$OS" == "Windows" ]]; then
            echo "matrix={\"include\":[$WINDOWS]}" >> "$GITHUB_OUTPUT"
          elif [[ "$OS" == "macOS" ]]; then
            echo "matrix={\"include\":[$MACOS]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[$LINUX]}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build matrix ──────────────────────────────────────────────────
  build:
    needs: filter
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.filter.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}
    name: Build – ${{ matrix.os_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux needs extra system packages for PyAutoGUI / screeninfo
      - name: Install Linux system dependencies
        if: matrix.os_name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev portaudio19-dev \
            xdg-utils libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── PyInstaller build (Server mode) ─────────────────────────
      - name: Build server executable (PyInstaller)
        shell: bash
        run: |
          SEP="${{ matrix.pyinstaller_sep }}"
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          import PyInstaller.__main__

          app_script = os.path.join('app', 'app.py')
          sep = '${SEP}'
          pyinstaller_options = [
              '--clean',
              '--noconfirm',
              '--name=Noclip Desktop',
              '--icon=app/resources/icon.png',
              '--onefile',
              '--hidden-import=pyautogui',
              '--hidden-import=appdirs',
              '--hidden-import=pyparsing',
              '--hidden-import=openai',
              '--hidden-import=google_genai',
              '--hidden-import=google',
              '--hidden-import=google.genai',
              '--hidden-import=anthropic',
              '--hidden-import=gradio',
              '--hidden-import=uvicorn',
              '--hidden-import=screeninfo',
              '--collect-all=gradio',
              '--collect-all=gradio_client',
              f'--add-data=app/resources/*{sep}resources',
              f'--add-data=app/*.py{sep}.',
              f'--add-data=app/utils/*.py{sep}utils',
              f'--add-data=app/models/*.py{sep}models',
              app_script
          ]
          PyInstaller.__main__.run(pyinstaller_options)
          "

      # ── Electron build (desktop app mode) ──────────────────────
      - name: Set up Node.js
        if: >-
          github.event.inputs.app_type == 'Electron (desktop app)' ||
          github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Electron server bundle
        if: >-
          github.event.inputs.app_type == 'Electron (desktop app)' ||
          github.event_name == 'push'
        shell: bash
        run: |
          mkdir -p dist/noclip-desktop-server
          cp "dist/${{ matrix.exe_name }}" dist/noclip-desktop-server/

      - name: Install Electron dependencies
        if: >-
          github.event.inputs.app_type == 'Electron (desktop app)' ||
          github.event_name == 'push'
        working-directory: electron
        run: npm install

      - name: Build Electron app
        if: >-
          github.event.inputs.app_type == 'Electron (desktop app)' ||
          github.event_name == 'push'
        working-directory: electron
        shell: bash
        run: |
          if [ "${{ matrix.os_name }}" = "Windows" ]; then
            npx electron-builder --win
          elif [ "${{ matrix.os_name }}" = "macOS" ]; then
            npx electron-builder --mac
          else
            npx electron-builder --linux
          fi

      # ── Upload artifacts ────────────────────────────────────────
      - name: Upload server artifact
        if: >-
          github.event.inputs.app_type == 'Server (localhost)' ||
          github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Noclip-Desktop-Server-${{ matrix.artifact_suffix }}
          path: dist/${{ matrix.exe_name }}

      - name: Upload Electron artifact
        if: >-
          github.event.inputs.app_type == 'Electron (desktop app)' ||
          github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Noclip-Desktop-Electron-${{ matrix.artifact_suffix }}
          path: electron/dist/*

      # ── Release assets (tag pushes only) ────────────────────────
      - name: Create zip archive (Server)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os_name }}" = "Windows" ]; then
            powershell Compress-Archive -Path '"${{ matrix.exe_name }}"' \
              -DestinationPath "Noclip-Desktop-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-Server.zip"
          else
            zip -r9 "Noclip-Desktop-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-Server.zip" \
              "${{ matrix.exe_name }}"
          fi

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Noclip-Desktop-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-Server.zip
            electron/dist/*
