name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          python -c "
          import os, platform, sys
          sys.path.insert(0, '.')
          import PyInstaller.__main__
          from app.version import version

          app_script = os.path.join('app', 'app.py')
          pyinstaller_options = [
              '--clean',
              '--noconfirm',
              '--name=Open Interface',
              '--icon=app/resources/icon.png',
              '--onefile',
              '--hidden-import=pyautogui',
              '--hidden-import=appdirs',
              '--hidden-import=pyparsing',
              '--hidden-import=openai',
              '--hidden-import=google_genai',
              '--hidden-import=google',
              '--hidden-import=google.genai',
              '--hidden-import=anthropic',
              '--hidden-import=gradio',
              '--hidden-import=uvicorn',
              '--hidden-import=screeninfo',
              '--collect-all=gradio',
              '--collect-all=gradio_client',
              '--add-data=app/resources/*;resources',
              '--add-data=app/*.py;.',
              '--add-data=app/utils/*.py;utils',
              '--add-data=app/models/*.py;models',
              app_script
          ]
          PyInstaller.__main__.run(pyinstaller_options)
          "

      - name: Create zip archive
        run: |
          cd dist
          Compress-Archive -Path 'Open Interface.exe' -DestinationPath 'Open-Interface-v${{ github.ref_name }}-Windows.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Open-Interface-Windows
          path: dist/Open Interface.exe

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Open-Interface-v${{ github.ref_name }}-Windows.zip
