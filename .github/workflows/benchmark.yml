name: Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner size'
        required: true
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-latest-16-cores
        default: 'ubuntu-latest'
      ollama_models:
        description: 'Comma-separated Ollama models to test (leave empty for mock-only)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'app/**'

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            portaudio19-dev \
            xdg-utils \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # ── Mock-only benchmarks (always run) ──
      - name: Run unit tests and benchmarks (mocked)
        run: |
          pytest tests/ -v --tb=short -x 2>&1 | tee benchmark-results.txt

      # ── Real Ollama benchmarks (opt-in) ──
      - name: Install and start Ollama
        if: ${{ github.event.inputs.ollama_models != '' }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          # Pull requested models
          IFS=',' read -ra MODELS <<< "${{ github.event.inputs.ollama_models }}"
          for model in "${MODELS[@]}"; do
            model=$(echo "$model" | xargs)  # trim whitespace
            echo "Pulling model: $model"
            ollama pull "$model"
          done

      - name: Run real Ollama benchmarks
        if: ${{ github.event.inputs.ollama_models != '' }}
        env:
          OLLAMA_ENDPOINT: http://localhost:11434
          OLLAMA_MODELS: ${{ github.event.inputs.ollama_models }}
        run: |
          pytest tests/ -v --tb=short -x 2>&1 | tee -a benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.txt
