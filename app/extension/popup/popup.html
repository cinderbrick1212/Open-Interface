<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Noclip Extension</title>
  <style>
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      text-align: center;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-weight: bold;
    }
    .connected { background: #e6fffa; color: #234e52; }
    .disconnected { background: #fff5f5; color: #742a2a; }
  </style>
</head>
<body>
  <h2>Noclip Desktop</h2>
  <div id="status" class="status disconnected">Waiting for status...</div>
  <script src="popup.js"></script>
</body>
</html>
